openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Portal Municipal Inteligente - API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenant
    description: Tenant configuration
  - name: noticias
    description: Notícias e comunicados
  - name: servicos
    description: Serviços ao cidadão
  - name: transparencia
    description: Portal da Transparência
  - name: licitacoes
    description: Licitações e contratos
  - name: legislacao
    description: Legislação municipal
  - name: agenda
    description: Agenda da prefeitura
  - name: galeria
    description: Galeria de fotos e vídeos
  - name: secretarias
    description: Secretarias municipais
  - name: busca
    description: Busca global
  - name: concursos
    description: Concursos e processos seletivos
  - name: servidor
    description: Portal do Servidor — autoatendimento funcional (requer JWT)
  - name: rh
    description: Painel RH — gestão de servidores (requer JWT + role admin/rh)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tenant/config:
    get:
      operationId: getTenantConfig
      tags: [tenant]
      summary: Get tenant configuration
      parameters:
        - name: tenant
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tenant configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantConfig"

  /noticias:
    get:
      operationId: listNoticias
      tags: [noticias]
      summary: Listar notícias
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: categoria
          in: query
          schema:
            type: string
        - name: destaque
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Lista de notícias
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoticiaListResponse"
    post:
      operationId: createNoticia
      tags: [noticias]
      summary: Criar notícia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoticia"
      responses:
        "201":
          description: Notícia criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Noticia"

  /noticias/{slug}:
    get:
      operationId: getNoticiaBySlug
      tags: [noticias]
      summary: Obter notícia por slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notícia encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Noticia"
        "404":
          description: Notícia não encontrada
    put:
      operationId: updateNoticia
      tags: [noticias]
      summary: Atualizar notícia
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoticia"
      responses:
        "200":
          description: Notícia atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Noticia"
    delete:
      operationId: deleteNoticia
      tags: [noticias]
      summary: Remover notícia
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Notícia removida

  /servicos:
    get:
      operationId: listServicos
      tags: [servicos]
      summary: Listar serviços ao cidadão
      parameters:
        - name: categoria
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Lista de serviços
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicoListResponse"

  /servicos/{slug}:
    get:
      operationId: getServico
      tags: [servicos]
      summary: Obter serviço por slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Serviço encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Servico"
        "404":
          description: Serviço não encontrado

  /secretarias:
    get:
      operationId: listSecretarias
      tags: [secretarias]
      summary: Listar secretarias municipais
      responses:
        "200":
          description: Lista de secretarias
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretariaListResponse"

  /secretarias/{slug}:
    get:
      operationId: getSecretaria
      tags: [secretarias]
      summary: Obter secretaria por slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Secretaria encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secretaria"

  /transparencia/orcamento:
    get:
      operationId: getOrcamento
      tags: [transparencia]
      summary: Dados do orçamento municipal
      parameters:
        - name: ano
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dados do orçamento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrcamentoResponse"

  /transparencia/despesas:
    get:
      operationId: listDespesas
      tags: [transparencia]
      summary: Listar despesas
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: ano
          in: query
          schema:
            type: integer
        - name: mes
          in: query
          schema:
            type: integer
        - name: secretaria
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista de despesas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DespesaListResponse"

  /transparencia/receitas:
    get:
      operationId: listReceitas
      tags: [transparencia]
      summary: Listar receitas
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: ano
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Lista de receitas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceitaListResponse"

  /transparencia/servidores:
    get:
      operationId: listServidores
      tags: [transparencia]
      summary: Listar servidores públicos
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: secretaria
          in: query
          schema:
            type: string
        - name: nome
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista de servidores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServidorListResponse"

  /licitacoes:
    get:
      operationId: listLicitacoes
      tags: [licitacoes]
      summary: Listar licitações
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: modalidade
          in: query
          schema:
            type: string
        - name: situacao
          in: query
          schema:
            type: string
        - name: ano
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Lista de licitações
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicitacaoListResponse"

  /licitacoes/{id}:
    get:
      operationId: getLicitacao
      tags: [licitacoes]
      summary: Obter licitação por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Licitação encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Licitacao"

  /legislacao:
    get:
      operationId: listLegislacao
      tags: [legislacao]
      summary: Listar legislação municipal
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
            enum: [lei, decreto, portaria, resolucao, instrucao-normativa]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: ano
          in: query
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista de legislação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegislacaoListResponse"

  /legislacao/{tipo}/{slug}:
    get:
      operationId: getLegislacao
      tags: [legislacao]
      summary: Obter legislação por tipo e slug
      parameters:
        - name: tipo
          in: path
          required: true
          schema:
            type: string
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Legislação encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Legislacao"

  /agenda:
    get:
      operationId: listAgenda
      tags: [agenda]
      summary: Listar eventos da agenda
      parameters:
        - name: mes
          in: query
          schema:
            type: integer
        - name: ano
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Lista de eventos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgendaListResponse"

  /galeria:
    get:
      operationId: listGaleria
      tags: [galeria]
      summary: Listar álbuns da galeria
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
            enum: [foto, video]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Lista de álbuns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GaleriaListResponse"

  /concursos:
    get:
      operationId: listConcursos
      tags: [concursos]
      summary: Listar concursos e processos seletivos
      parameters:
        - name: situacao
          in: query
          schema:
            type: string
            enum: [aberto, encerrado, em-andamento, previsto]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Lista de concursos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConcursoListResponse"

  /busca:
    get:
      operationId: globalSearch
      tags: [busca]
      summary: Busca global no portal
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: tipo
          in: query
          schema:
            type: string
            enum: [noticia, servico, licitacao, legislacao, secretaria]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Resultados da busca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuscaResponse"

  /municipio/info:
    get:
      operationId: getMunicipioInfo
      tags: [tenant]
      summary: Informações do município
      responses:
        "200":
          description: Informações do município
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MunicipioInfo"

  /governo/prefeito:
    get:
      operationId: getPrefeito
      tags: [tenant]
      summary: Dados do prefeito
      responses:
        "200":
          description: Dados do prefeito
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gestor"

  /governo/vice-prefeito:
    get:
      operationId: getVicePrefeito
      tags: [tenant]
      summary: Dados do vice-prefeito
      responses:
        "200":
          description: Dados do vice-prefeito
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gestor"

  # ── Portal do Servidor (/servidor/*) ─────────────────────────────────────────

  /servidor/contracheques:
    get:
      operationId: listContracheques
      tags: [servidor]
      summary: Listar contracheques do servidor
      security:
        - bearerAuth: []
      parameters:
        - name: ano
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
      responses:
        "200":
          description: Lista de contracheques paginada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContrachequeListResponse"
        "401":
          description: Não autenticado

  /servidor/contracheques/{mes}/{ano}:
    get:
      operationId: getContracheque
      tags: [servidor]
      summary: Detalhes do contracheque por mês e ano
      security:
        - bearerAuth: []
      parameters:
        - name: mes
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: ano
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contracheque com linhas detalhadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContrachequeDetalhe"
        "401":
          description: Não autenticado
        "404":
          description: Contracheque não encontrado

  /servidor/contracheques/{mes}/{ano}/pdf:
    get:
      operationId: downloadContrachequePdf
      tags: [servidor]
      summary: Download do contracheque em PDF
      security:
        - bearerAuth: []
      parameters:
        - name: mes
          in: path
          required: true
          schema:
            type: integer
        - name: ano
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Arquivo PDF do contracheque
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Não autenticado
        "404":
          description: Contracheque não encontrado

  /servidor/rendimentos/{ano}:
    get:
      operationId: getRendimentosAnuais
      tags: [servidor]
      summary: Declaração de rendimentos anual (IRRF)
      security:
        - bearerAuth: []
      parameters:
        - name: ano
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rendimentos anuais consolidados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RendimentosAnuais"
        "401":
          description: Não autenticado

  /servidor/ferias/saldo:
    get:
      operationId: getFeriasSaldo
      tags: [servidor]
      summary: Saldo de férias e períodos aquisitivos
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saldo atual e progresso aquisitivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeriasSaldo"
        "401":
          description: Não autenticado

  /servidor/ferias/historico:
    get:
      operationId: listFeriasHistorico
      tags: [servidor]
      summary: Histórico de solicitações de férias
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de solicitações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SolicitacaoFerias"

  /servidor/ferias/solicitar:
    post:
      operationId: solicitarFerias
      tags: [servidor]
      summary: Solicitar férias
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                periodoAquisitivoId:
                  type: string
                dataInicio:
                  type: string
                  format: date
                qtdDias:
                  type: integer
                  minimum: 5
                parcelamento:
                  type: integer
                  enum: [1, 2, 3]
                  default: 1
                adiantamento13:
                  type: boolean
                  default: false
                abonoPecuniario:
                  type: boolean
                  default: false
                diasAbono:
                  type: integer
                  default: 0
              required: [periodoAquisitivoId, dataInicio, qtdDias]
      responses:
        "201":
          description: Solicitação criada com protocolo
        "400":
          description: Dados inválidos ou saldo insuficiente
        "401":
          description: Não autenticado

  /servidor/ferias/{id}:
    get:
      operationId: getFeriasDetalhe
      tags: [servidor]
      summary: Detalhe da solicitação de férias
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Solicitação com timeline
        "401":
          description: Não autenticado
        "404":
          description: Solicitação não encontrada

  /servidor/requerimentos:
    get:
      operationId: listRequerimentos
      tags: [servidor]
      summary: Listar requerimentos do servidor
      security:
        - bearerAuth: []
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista de requerimentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Requerimento"
                  tipos:
                    type: array
                    items:
                      type: string
    post:
      operationId: criarRequerimento
      tags: [servidor]
      summary: Protocolar novo requerimento
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tipo:
                  type: string
                assunto:
                  type: string
                justificativa:
                  type: string
                  minLength: 100
                camposEspecificos:
                  type: object
                documentos:
                  type: array
                  description: URLs de arquivos previamente enviados via upload
                  items:
                    type: object
                    properties:
                      nome:
                        type: string
                      url:
                        type: string
                      tamanho:
                        type: integer
                    required: [nome, url]
              required: [tipo, justificativa]
      responses:
        "201":
          description: Requerimento protocolado
        "400":
          description: Dados inválidos (justificativa mínimo 100 chars)
        "401":
          description: Não autenticado

  /servidor/requerimentos/{id}:
    get:
      operationId: getRequerimento
      tags: [servidor]
      summary: Detalhe do requerimento com tramitação
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Requerimento com timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requerimento"
        "401":
          description: Não autenticado
        "404":
          description: Requerimento não encontrado

  /servidor/requerimentos/{id}/recurso:
    post:
      operationId: apresentarRecurso
      tags: [servidor]
      summary: Apresentar recurso para requerimento indeferido
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recurso aceito
        "400":
          description: Requerimento não indeferido ou prazo encerrado
        "401":
          description: Não autenticado

  /servidor/perfil:
    get:
      operationId: getPerfilServidor
      tags: [servidor]
      summary: Dados cadastrais do servidor (CPF e conta mascarados)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfilServidor"
        "401":
          description: Não autenticado
    put:
      operationId: updatePerfilServidor
      tags: [servidor]
      summary: Atualizar dados pessoais editáveis (endereço, email pessoal, telefone)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailPessoal:
                  type: string
                telefone:
                  type: string
                endereco:
                  type: string
                numero:
                  type: string
                complemento:
                  type: string
                bairro:
                  type: string
                cidade:
                  type: string
                estado:
                  type: string
                cep:
                  type: string
      responses:
        "200":
          description: Perfil atualizado
        "401":
          description: Não autenticado

  /servidor/historico-funcional:
    get:
      operationId: getHistoricoFuncional
      tags: [servidor]
      summary: Timeline de eventos da vida funcional
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de eventos funcionais
        "401":
          description: Não autenticado

  /servidor/tempo-servico:
    get:
      operationId: getTempoServico
      tags: [servidor]
      summary: Tempo de serviço com projeção de aposentadoria
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tempo de serviço calculado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TempoServico"
        "401":
          description: Não autenticado

  # ── Painel RH (/rh/*) ────────────────────────────────────────────────────────

  /rh/dashboard:
    get:
      operationId: getRhDashboard
      tags: [rh]
      summary: Dashboard do Painel RH (requer role admin ou rh)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: KPIs e listas do painel RH
          content:
            application/json:
              schema:
