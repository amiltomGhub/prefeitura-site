kind = "web"
previewPath = "/"
title = "Portal Municipal Inteligente"
version = "1.0.0"
id = "artifacts/portal-municipal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21851

[services.development]
run = "pnpm --filter @workspace/portal-municipal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portal-municipal", "run", "build" ]
publicDir = "artifacts/portal-municipal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21851"
BASE_PATH = "/"
