kind = "mobile"
previewPath = "/app-cidadao/"
title = "App Cidadão — Portal Municipal"
version = "1.0.0"
id = "artifacts/app-cidadao"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/app-cidadao/" ]
localPort = 23254

[services.development]
run = "pnpm --filter @workspace/app-cidadao run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/app-cidadao", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/app-cidadao", "run", "serve" ]

[services.env]
PORT = "23254"
BASE_PATH = "/app-cidadao/"
